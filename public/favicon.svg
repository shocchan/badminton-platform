<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- 青い円背景 -->
  <circle cx="24" cy="24" r="24" fill="#1D4ED8"/>

  <!-- ラケット（頭部の楕円） -->
  <ellipse cx="20" cy="17" rx="9" ry="11" fill="none" stroke="white" stroke-width="2.2"/>

  <!-- ラケット内のグリッド線（横） -->
  <line x1="11.5" y1="13" x2="28.5" y2="13" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <line x1="11" y1="17" x2="29" y2="17" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <line x1="11.5" y1="21" x2="28.5" y2="21" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <!-- ラケット内のグリッド線（縦） -->
  <line x1="16" y1="6.5" x2="16" y2="27.5" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="6" x2="20" y2="28" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="6.5" x2="24" y2="27.5" stroke="white" stroke-width="0.8" opacity="0.6"/>

  <!-- ハンドル -->
  <rect x="19" y="27.5" width="2.5" height="9" rx="1.2" fill="white"/>

  <!-- シャトルコック（右下） -->
  <circle cx="34" cy="36" r="2.5" fill="white"/>
  <!-- シャトルの羽根 -->
  <line x1="34" y1="33.5" x2="30" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="33.5" x2="34" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="33.5" x2="38" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 羽根の先端をつなぐ弧（横線） -->
  <path d="M 30.5 27.5 Q 34 25.5 37.5 27.5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
