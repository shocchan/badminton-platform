<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png?v=3" />
    <link rel="icon" type="image/png" href="/favicon.png?v=3" />
    <link rel="apple-touch-icon" href="/favicon.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      サイト共通フォールバック（Phase 1.5）
      対象ページでは Worker が初期HTMLの各 meta を上書きし、SPA遷移後は usePageMeta が in-place で更新する。
      対象外ページや Worker 注入失敗時のみ、このフォールバックがそのまま出る。
      → 「タグ数は必ず1件ずつ、値はサイト共通の安全な内容」を保つ。ページ固有値はここに書かない。
    -->
    <title>川口・蕨バドミントン交流会（kawabado）</title>
    <meta name="description" content="川口市・蕨市エリアで開催しているバドミントン交流会・大会・通常活動。初参加・一人参加歓迎、多国籍メンバーが集まる国際交流コミュニティ。" />
    <link rel="canonical" href="https://kawabado.com/ja/" />

    <!-- OGP（JSを実行しないSNSクローラー向け。Worker が対象ページで上書き） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="川口・蕨バドミントン交流会（kawabado）" />
    <meta property="og:title" content="川口・蕨バドミントン交流会（kawabado）" />
    <meta property="og:description" content="川口市・蕨市エリアで開催しているバドミントン交流会・大会・通常活動。初参加・一人参加歓迎、多国籍メンバーが集まる国際交流コミュニティ。" />
    <meta property="og:url" content="https://kawabado.com/ja/" />
    <meta property="og:image" content="https://kawabado.com/ogp.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="川口・蕨バドミントン交流会（kawabado）" />
    <meta name="twitter:description" content="川口市・蕨市エリアで開催しているバドミントン交流会・大会・通常活動。初参加・一人参加歓迎、多国籍メンバーが集まる国際交流コミュニティ。" />
    <meta name="twitter:image" content="https://kawabado.com/ogp.jpg" />

    <!-- 手書き風フォント（参加者の声で使用。unicode-range分割配信のため実転送は小さい） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
